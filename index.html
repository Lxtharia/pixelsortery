<html>
    <head>
        <!-- <link data-trunk rel="scss" href="path/to/index.scss"/> -->
        <link data-trunk rel="rust"/>
        <link rel="alternate icon" type="image/x-icon" href="favicon.ico">
        <link data-trunk rel="copy-file" href="assets/favicon.ico" data-target-path="./"/>
    </head>
    <style>
    :root {
    --banner-height: 20pt;
    }
    body {
    background-color: black;
    margin: 0;
    height: 100%;
    }
    #egui-canvas {
    width: 100%;
    height: calc(100% - var(--banner-height));
    }
    #banner {
    position: relative;
    top: 0;
    left: 0;
    /* no padding! */
    height: var(--banner-height);
    background-color: #784dc5;
    }
    a:visited {
    color: #fff1e2;
    }
    #banner p {
    margin: auto 2pt;
    text-align: center;
    font-size: 10pt;
    font-weight: bold;
    font-family: sans;;
    }
    </style>
    <body>
        <div id=banner>
            <div style="padding: 5pt;">
                <p> Note: The web-version of the pixelsortery is currently a bit slow. If you want to sort big images or just want less lag, <a href="https://github.com/Lxtharia/pixelsortery/releases/tag/v0.9.0">download the desktop version</a>!</p>
            </div>
        </div>
        <canvas id="egui-canvas">
        </canvas>
    </body>
</html>
